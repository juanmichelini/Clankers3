<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clankers 3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background:#111; color:#eee; font-family:monospace; padding:1.5rem; margin:0; }
    h1 { color:#f90; margin:0 0 1.2rem; font-size:1.3rem; letter-spacing:.1em; }

    /* ── Instruments ── */
    .inst { margin-bottom:1rem; border:1px solid #1e1e1e; border-radius:4px; padding:.6rem .8rem; }
    .inst-hdr { font-size:.72rem; color:#555; letter-spacing:.08em; margin-bottom:.5rem; display:flex; align-items:center; gap:.5rem; }
    .inst-hdr span { color:#f90; }
    .ms-btn { font-size:.6rem; padding:.1rem .35rem; border:1px solid #333; background:#1a1a1a;
              color:#666; cursor:pointer; border-radius:2px; font-family:monospace; min-width:1.4rem;
              text-align:center; user-select:none; }
    .ms-btn:hover { border-color:#555; }
    .ms-btn.active-m { background:#a03020; color:#fff; border-color:#a03020; }
    .ms-btn.active-s { background:#20a040; color:#fff; border-color:#20a040; }
    .vol-wrap { display:inline-flex; align-items:center; gap:.25rem; margin-left:.3rem; }
    .vol-wrap label { font-size:.58rem; color:#444; }
    .vol-slider { width:56px; height:3px; accent-color:#f90; cursor:pointer; vertical-align:middle; }

    /* ── Pads ── */
    .pads { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.5rem; }
    .pad {
      background:#1a1a1a; color:#ccc; border:1px solid #2e2e2e;
      padding:.4rem .55rem; cursor:pointer; border-radius:3px;
      font-family:monospace; font-size:.75rem; min-width:2.5rem; text-align:center;
      user-select:none;
    }
    .pad:hover  { background:#252525; border-color:#444; }
    .pad:active { background:#f90; color:#111; border-color:#f90; }

    /* colour accents per instrument */
    .drums .pad  { border-top-color:#8a3020; }
    .bass  .pad  { border-top-color:#1a5050; }
    .buchla .pad { border-top-color:#604010; }
    .chords .pad { border-top-color:#1a3050; }

    /* ── Knobs ── */
    .knob-row { display:flex; flex-wrap:wrap; gap:.5rem; align-items:flex-start; }
    .knob-group { display:flex; gap:.4rem; align-items:flex-start; padding-right:.6rem;
                  border-right:1px solid #1e1e1e; }
    .knob-group:last-child { border-right:none; }
    .knob-group-label { font-size:.6rem; color:#444; writing-mode:vertical-rl;
                        text-orientation:mixed; padding-right:.2rem; align-self:center; }
    .knob-wrap { display:flex; flex-direction:column; align-items:center; width:52px; }
    .knob-canvas { cursor:ns-resize; touch-action:none; }
    .knob-val { font-size:.62rem; color:#f90; text-align:center; line-height:1.2; }
    .knob-lab { font-size:.58rem; color:#555; text-align:center; }

    /* ── Sequencer ── */
    .seq-section { margin-bottom:1rem; }
    .seq-section h2 { color:#555; font-size:.8rem; margin:0 0 .5rem; letter-spacing:.08em; }
    #seq-controls { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; margin-bottom:.5rem; }
    #bpm-val { color:#f90; min-width:2.5rem; display:inline-block; }
    textarea {
      background:#0e0e0e; color:#888; border:1px solid #1e1e1e;
      width:100%; max-width:700px; height:10rem;
      font-family:monospace; font-size:.7rem; padding:.4rem; resize:vertical;
    }
    textarea:focus { outline:none; border-color:#333; color:#aaa; }
    .label-sm { font-size:.65rem; color:#444; display:block; margin-bottom:.2rem; }

    button {
      background:#1a1a1a; color:#ccc; border:1px solid #2e2e2e;
      padding:.45rem .7rem; cursor:pointer; border-radius:3px;
      font-family:monospace; font-size:.78rem;
    }
    button:hover { background:#252525; border-color:#444; }
    button:disabled { opacity:.4; cursor:default; }
    .play-btn  { background:#0e1e0e; border-color:#1e4e1e; color:#5d5; }
    .play-btn:hover { background:#152515; border-color:#2e6e2e; }
    .stop-btn  { background:#1e0e0e; border-color:#4e1e1e; color:#d55; }
    .stop-btn:hover { background:#251515; border-color:#6e2e2e; }
    .bake-btn  { background:#1a1200; border-color:#4a3800; color:#f90; }
    .bake-btn:hover { background:#221800; border-color:#6a5000; }

    /* ── Chat ── */
    .chat-section { max-width:700px; }
    .chat-section h2 { color:#555; font-size:.8rem; margin:0 0 .5rem; letter-spacing:.08em; }
    #chat-messages { background:#0a0a0a; border:1px solid #1a1a1a; padding:.5rem;
                     height:9rem; overflow-y:auto; font-size:.72rem; margin-bottom:.4rem; }
    .msg-user { color:#f90; margin:.15rem 0; }
    .msg-band { color:#6af; margin:.15rem 0; }
    .msg-sys  { color:#444; margin:.15rem 0; font-style:italic; }
    .input-row { display:flex; gap:.4rem; margin-bottom:.4rem; }
    .input-row input { flex:1; background:#0e0e0e; color:#ccc; border:1px solid #1e1e1e;
                       padding:.4rem .5rem; font-family:monospace; font-size:.75rem; }
    .input-row input:focus { outline:none; border-color:#333; }
    #btn-new-session { background:#0e0e1e; border-color:#1e1e4e; }
    #session-badge   { color:#444; font-size:.68rem; }

    /* ── Log ── */
    #log { margin-top:1rem; font-size:.65rem; color:#333; white-space:pre;
           max-height:6rem; overflow-y:auto; }

    /* ── Song Mode ── */
    .song-section { margin-bottom:1rem; border:1px solid #1e1e1e; border-radius:4px; padding:.6rem .8rem; }
    .song-hdr { font-size:.72rem; color:#555; letter-spacing:.08em; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; margin-bottom:.5rem; }
    .song-hdr span { color:#f90; }
    .pat-bank { display:flex; flex-wrap:wrap; gap:.35rem; }
    .pat-btn { min-width:4rem; font-size:.68rem; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pat-btn.has-pat { border-color:#604010; color:#c87020; }
    .pat-btn.active-pat { background:#1a1200; border-color:#f90; color:#f90; }
    .pat-btn.has-pat.active-pat { color:#f90; }
    .arr-grid { display:flex; flex-wrap:wrap; gap:.3rem; margin-top:.4rem; }
    .arr-slot { width:2.6rem; height:2.2rem; background:#111; border:1px solid #1a1a1a; cursor:pointer;
                border-radius:3px; display:flex; align-items:center; justify-content:center;
                font-size:.65rem; color:#444; font-family:monospace; user-select:none; }
    .arr-slot:hover { border-color:#333; color:#666; }
    .arr-slot.has-pat { background:#110d00; border-color:#604010; color:#c87020; }
    .arr-slot.arr-playing { border-color:#f90 !important; color:#f90 !important; box-shadow:0 0 5px #f903; }
    .mode-btn { font-size:.65rem; padding:.2rem .5rem; }
    .mode-active { background:#1a1200; border-color:#f90; color:#f90; }
  </style>
</head>

<script type="module">
import init, { ClankersDrums, ClankersBass, ClankersBuchla, ClankersPads }
  from './wasm/clankers_dsp.js?v=12';
import { Sequencer } from './sequencer.js?v=12';

// ─── Knob class ────────────────────────────────────────────────────────────
class Knob {
  constructor(container, { label, min, max, value, step = 0.01 }) {
    this.min = min; this.max = max; this._v = value; this.step = step;
    const SIZE = 44;
    this.cv  = Object.assign(document.createElement('canvas'),
      { width: SIZE, height: SIZE, className: 'knob-canvas' });
    this.vEl = Object.assign(document.createElement('div'), { className: 'knob-val' });
    this.lEl = Object.assign(document.createElement('div'), { className: 'knob-lab',
      textContent: label });
    container.classList.add('knob-wrap');
    container.append(this.cv, this.vEl, this.lEl);

    this.onChange = null; // callback set externally
    let py = 0, pv = 0;
    const self = this;
    this.cv.addEventListener('mousedown', e => {
      py = e.clientY; pv = self._v;
      e.preventDefault();
      function onMove(e2) {
        const range = max - min;
        self._v = Math.max(min, Math.min(max, pv + (py - e2.clientY) / 100 * range));
        self._draw();
        if (self.onChange) self.onChange(self._v);
      }
      function onUp() {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
    this.cv.addEventListener('wheel', e => {
      e.preventDefault();
      const bump = step >= 1 ? step * 3 : step * 5;
      this._v = Math.max(min, Math.min(max, this._v + (e.deltaY < 0 ? bump : -bump)));
      this._draw();
      if (this.onChange) this.onChange(this._v);
    }, { passive: false });
    // Double-click to reset
    this.cv.addEventListener('dblclick', () => { this._v = value; this._draw(); if (this.onChange) this.onChange(this._v); });
    this._draw();
  }
  _draw() {
    const c = this.cv.getContext('2d'), cx = 22, cy = 22, r = 17;
    const sa = Math.PI * 0.75, ea = Math.PI * 2.25;
    const t  = (this._v - this.min) / (this.max - this.min);
    const va = sa + t * (ea - sa);
    c.clearRect(0, 0, 44, 44);
    c.lineWidth = 3.5; c.lineCap = 'round';
    c.beginPath(); c.arc(cx, cy, r, sa, ea);
    c.strokeStyle = '#252525'; c.stroke();
    c.beginPath(); c.arc(cx, cy, r, sa, va);
    c.strokeStyle = '#f90'; c.stroke();
    c.beginPath();
    c.moveTo(cx + Math.cos(va) * 6, cy + Math.sin(va) * 6);
    c.lineTo(cx + Math.cos(va) * (r - 1), cy + Math.sin(va) * (r - 1));
    c.strokeStyle = '#fff'; c.lineWidth = 1.5; c.stroke();
    const isInt = this.step >= 1;
    this.vEl.textContent = isInt ? Math.round(this._v) : this._v.toFixed(2);
  }
  get val() { return this.step >= 1 ? Math.round(this._v) : this._v; }
}

// ─── Knob group helper ─────────────────────────────────────────────────────
function makeKnobGroup(container, groupLabel, knobDefs) {
  const group = document.createElement('div');
  group.className = 'knob-group';
  if (groupLabel) {
    const lbl = document.createElement('div');
    lbl.className = 'knob-group-label';
    lbl.textContent = groupLabel;
    group.appendChild(lbl);
  }
  const knobs = {};
  for (const def of knobDefs) {
    const wrap = document.createElement('div');
    group.appendChild(wrap);
    knobs[def.id] = new Knob(wrap, def);
  }
  container.appendChild(group);
  return knobs;
}

// ─── Audio state ───────────────────────────────────────────────────────────
let ctx    = null;
let engine = null;   // ClankersDrums
let bass   = null;   // ClankersBass
let buchla = null;   // ClankersBuchla
let pads   = null;   // ClankersPads

async function ensureReady() {
  if (engine) {
    if (ctx.state === 'suspended') await ctx.resume();
    return;
  }
  ctx = new AudioContext({ sampleRate: 44100 });
  log('AudioContext @ ' + ctx.sampleRate + ' Hz');
  await init();
  const seed = (Math.random() * 0xffffffff) >>> 0;
  engine = new ClankersDrums(seed);
  bass   = new ClankersBass(seed ^ 0xdeadbeef);
  buchla = new ClankersBuchla();
  pads   = new ClankersPads();
  log('WASM engines ready — click any pad!');
  // Debug exports
  window._engine = engine; window._bass = bass; window._buchla = buchla; window._pads = pads;
  window._ctx = ctx;
}

function playMono(samples) {
  if (!samples || !samples.length) return;
  const ab  = ctx.createBuffer(1, samples.length, 44100);
  ab.copyToChannel(samples, 0);
  const src = ctx.createBufferSource();
  src.buffer = ab;
  src.connect(ctx.destination);
  src.start();
}

function playStereoInterleaved(interleaved) {
  if (!interleaved || interleaved.length < 2) return;
  const frames = Math.floor(interleaved.length / 2);
  const ab  = ctx.createBuffer(2, frames, 44100);
  const l = new Float32Array(frames), r = new Float32Array(frames);
  for (let i = 0; i < frames; i++) { l[i] = interleaved[i*2]; r[i] = interleaved[i*2+1]; }
  ab.copyToChannel(l, 0); ab.copyToChannel(r, 1);
  const src = ctx.createBufferSource();
  src.buffer = ab; src.connect(ctx.destination); src.start();
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

const rerenderDrums = debounce(() => {
  if (!seq || !seq.isPlaying) return;
  seq.rerender('drum', ev => {
    switch (ev.voiceId) {
      case 0: return { p0: dk['k-pitch'].val, p1: dk['k-sweep'].val, p2: dk['k-decay'].val };
      case 1: return { p0: dk['s-pitch'].val, p1: dk['s-decay'].val };

      case 3: return { p0: dk['h-decay'].val * 1.5, p1: dk['h-cutoff'].val * 0.8 };

// Build concatenated song sheet from arrangement
function buildSongSheet() {
  const steps = [];
  arrStepOffsets = [];
  let bpm = null;
  for (const si of songArrangement) {
    const pat = patternBank[si];
    if (!pat) continue;
    arrStepOffsets.push(steps.length);
    bpm = bpm ?? pat.sheet.bpm;
    steps.push(...pat.sheet.steps);
  }
  return { bpm: bpm ?? 120, steps };
}

// Highlight current arrangement position while song plays
function startArrIndicator() {
  stopArrIndicator();
  arrPlayTimer = setInterval(() => {
    if (!seq?.isPlaying || !songMode) return;
    const idx = seq._stepIdx;
    let playing = arrStepOffsets.length - 1;
    for (let i = 0; i < arrStepOffsets.length - 1; i++) {
      if (idx < arrStepOffsets[i + 1]) { playing = i; break; }
    }
    arrSlots.forEach((s, i) => s.classList.toggle('arr-playing', i === playing && i < songArrangement.length));
  }, 80);
}
function stopArrIndicator() {
  if (arrPlayTimer) { clearInterval(arrPlayTimer); arrPlayTimer = null; }
  arrSlots.forEach(s => s.classList.remove('arr-playing'));
}

// ─── Bake knobs → JSON ────────────────────────────────────────────────────
function bakeToJson() {
  let sheet;
  try { sheet = JSON.parse(document.getElementById('sheet-json').value); }
  catch (e) { log('Bake failed — invalid JSON: ' + e.message); return; }

  const octShift = bassOctKnob.val * 12;
  const bassCC   = { 71: bk['b-res'].val,   74: bk['b-cutoff'].val, 23: bk['b-fdec'].val };
  const buchlaCC = { 74: uk['u-cutoff'].val, 20: uk['u-fold'].val,   17: uk['u-fm'].val,
                     19: uk['u-decay'].val,  71: uk['u-res'].val };
  const padsCC   = { 74: pk['p-cutoff'].val, 73: pk['p-atk'].val,    72: pk['p-rel'].val,
                     91: pk['p-rev'].val,    30: pk['p-cho'].val,     31: pk['p-cho'].val };
  const ccByType = { 1: buchlaCC, 2: bassCC, 6: padsCC };

  // Drum knobs are 0-1 (direct p0/p1/p2); JSON CCs are 0-127 — multiply to convert.
  // drumNoteToParams: kick=CC74(pitch)/CC23(sweep)/CC75(decay),
  //                  snare=CC74(pitch)/CC75(decay), hh=CC74(decay)
  const k127 = v => Math.round(v * 127);
  const kickCC  = { 74: k127(dk['k-pitch'].val), 23: k127(dk['k-sweep'].val), 75: k127(dk['k-decay'].val) };
  const snareCC = { 74: k127(dk['s-pitch'].val), 75: k127(dk['s-decay'].val) };
  const hhCC    = { 74: k127(dk['h-decay'].val) };
  const HH_NOTES = new Set([42, 46, 49, 50, 51, 52, 53, 54, 55, 56, 57]);

  for (const step of sheet.steps ?? []) {
    for (const track of step.tracks ?? []) {
      if (track.t === 10) {
        const drumCC = {};
        for (const note of track.n ?? []) {
          if (note === 36)                       Object.assign(drumCC, kickCC);
          else if (note === 38 || note === 40)   Object.assign(drumCC, snareCC);
          else if (HH_NOTES.has(note))           Object.assign(drumCC, hhCC);
        }
        if (Object.keys(drumCC).length) track.cc = { ...track.cc, ...drumCC };
        continue;
      }
      if (track.t === 2 && octShift !== 0) {
        track.n = (track.n ?? []).map(n => Math.max(0, Math.min(127, n + octShift)));
      }
      const overlay = ccByType[track.t];
      if (!overlay) continue;
      track.cc = { ...track.cc, ...overlay };
    }
  }

  // Reset octave knob — notes are now embedded in JSON
  if (octShift !== 0) {
    bassOctKnob._v = 0;
    bassOctKnob._draw();
  }

  document.getElementById('sheet-json').value = JSON.stringify(sheet, null, 2);
  log('⬇ knobs baked into JSON');
}

document.getElementById('btn-bake').addEventListener('click', bakeToJson);

  if (!brief) { chatAppend('Enter a track brief first.', 'msg-sys'); return; }
  chatAppend('Starting session…', 'msg-sys');
  document.getElementById('btn-new-session').disabled = true;
  try {
    const res  = await fetch(`${API}/session/new`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brief, section: 'verse1', solo: true }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    sessionId = data.session_id;
    document.getElementById('session-badge').textContent = `[${sessionId.slice(0,8)}]`;
    chatInput.disabled = false; chatSend.disabled = false;
    chatAppend('Session started. The band is ready.', 'msg-sys');
    sheetToSequencer(data.sheet);
  } catch (e) {
    chatAppend('Error: ' + e + ' — is the API running? (uvicorn api.main:app --port 8000)', 'msg-sys');
  } finally {
    document.getElementById('btn-new-session').disabled = false;
  }
});

async function sendChat() {
  const msg = chatInput.value.trim();
  if (!msg || !sessionId) return;
  chatInput.value = '';
  chatAppend('You: ' + msg, 'msg-user');
  chatSend.disabled = true;
  try {
    const res  = await fetch(`${API}/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: msg }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    chatAppend(`${data.companion}: ${data.reply}`, 'msg-band');
    sheetToSequencer(data.sheet);
  } catch (e) {
    chatAppend('Error: ' + e, 'msg-sys');
  } finally {
    chatSend.disabled = false; chatInput.focus();
  }
}

chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

// ─── Log helper ────────────────────────────────────────────────────────────
function log(msg) { document.getElementById('log').textContent += '\n' + msg; }
</script>
</body>
